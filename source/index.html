<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>POD서버</title>
    <style>
        #top_bar {
            height: 40px;
            line-height: 40px;
            text-align: center;
            word-spacing: 40px;
            background-color: #cccccc;
        }

        .menu {
            width: 1000px;
            margin: 30px auto;
            text-align: center;
        }

        ul {
            padding: 0;
        }

        li {
            display: inline-block;
            width: 130px;
            padding: 15px;
            font-size: 20px;
            margin: 5px;
            border-radius: 8px;
        }

        /* 개인 탭 콘텐츠 */
        .personal-section {
            width: 1000px;
            margin: 20px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
        }

        .personal-title {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .personal-items span {
            display: inline-block;
            margin: 10px 15px;
            padding: 10px 15px;
            background: #e6f2ff;
            border-radius: 6px;
        }

        .media {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>

<body bgcolor="green">

    <!-- 상단 메뉴 -->
    <div id="top_bar">
        개인 ㅣ 기업 ㅣ 금융상품 ㅣ 자산관리 ㅣ 퇴직연금 ㅣ 카드
    </div>

    <!-- 개인 탭 선택 시 콘텐츠 -->
    <div class="personal-section">
        <div class="personal-title">개인 뱅킹 서비스</div>
        <div class="personal-items">
            <span>계좌조회</span>
            <span>계좌이체</span>
            <span>자동이체 관리</span>
            <span>공과금 납부</span>
            <span>카드 이용내역</span>
            <span>대출 조회</span>
        </div>
    </div>

    <!-- 미디어 -->
    <div class="media">
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/rj7xMBxd5iY"
            frameborder="0"
            allowfullscreen>
        </iframe>
        <br><br>
        <img width="800"
            src="https://mblogthumb-phinf.pstatic.net/20120416_141/hrwyfgd_1334540205911hNGUU_JPEG/%B0%ED%C8%AD%C1%FA%C4%C4%C7%BB%C5%CD%B9%D9%C5%C1%C8%AD%B8%E921.jpg?type=w2">
    </div>

</body>
</html>
